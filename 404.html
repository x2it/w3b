<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="知行工作室 - 页面未找到" data-i18n-content="404.meta.description">
    <meta name="robots" content="noindex, nofollow">
    <title data-i18n-content="404.meta.title">页面未找到 · 知行工作室</title>
    <link rel="stylesheet" href="/assets/css/style.css?v=20260624">
    <script src="/assets/js/i18n.js?v=20260624"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
    <style>
        /* 主题变量定义：见 /assets/css/style.css */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-normal), color var(--transition-normal);
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .site-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            color: var(--dark-color);
            line-height: 1.2;
        }

        .site-subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 1.5rem;
            line-height: 1.5;
        }

        .error-section {
            text-align: center;
            padding: 4rem 1rem;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 300;
            color: var(--accent-color);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .error-message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .back-home {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-home:hover {
            background: var(--accent-secondary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(var(--accent-rgb, 99, 102, 241), 0.3);
        }

        @media (max-width: 768px) {
            header { padding: 2rem 1rem 1.5rem; }
            .error-section { padding: 3rem 1rem; }
        }

        @media (max-width: 480px) {
            .error-code { font-size: 4rem; }
            .error-section { padding: 2rem 1rem; }
            .back-home { padding: 0.7rem 1.5rem; font-size: 0.9rem; }
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            border-top: 1px solid var(--border-color);
            margin-top: 3rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        footer p { margin-bottom: 0.5rem; }

        .copyright { color: var(--text-light); font-size: 0.85rem; }
    </style>
</head>
<body>
    <!-- AI神经网络背景装饰 -->
    <svg class="neural-bg" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.03; pointer-events: none;">
        <defs>
            <pattern id="neural-grid" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
                <circle cx="100" cy="100" r="2" fill="currentColor"/>
                <circle cx="0" cy="0" r="1.5" fill="currentColor"/>
                <circle cx="200" cy="0" r="1.5" fill="currentColor"/>
                <circle cx="0" cy="200" r="1.5" fill="currentColor"/>
                <circle cx="200" cy="200" r="1.5" fill="currentColor"/>
                <circle cx="50" cy="50" r="1" fill="currentColor"/>
                <circle cx="150" cy="50" r="1" fill="currentColor"/>
                <circle cx="50" cy="150" r="1" fill="currentColor"/>
                <circle cx="150" cy="150" r="1" fill="currentColor"/>
                <line x1="100" y1="100" x2="50" y2="50" stroke="currentColor" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="150" y2="50" stroke="currentColor" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="50" y2="150" stroke="currentColor" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="150" y2="150" stroke="currentColor" stroke-width="0.5"/>
                <line x1="50" y1="50" x2="150" y2="50" stroke="currentColor" stroke-width="0.3"/>
                <line x1="50" y1="150" x2="150" y2="150" stroke="currentColor" stroke-width="0.3"/>
                <line x1="50" y1="50" x2="50" y2="150" stroke="currentColor" stroke-width="0.3"/>
                <line x1="150" y1="50" x2="150" y2="150" stroke="currentColor" stroke-width="0.3"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#neural-grid)"/>
    </svg>

    <header>
        <h1 class="site-title" data-i18n="site.title">知行工作室</h1>
    </header>

    <section class="error-section">
        <div class="error-code">404</div>
        <p class="error-message" data-i18n="404.message">
            页面未找到<br>
            您访问的页面可能已被移除或暂时不可用
        </p>
        <a href="/" class="back-home" data-i18n="404.back">返回首页</a>
    </section>

    <footer>
        <p style="color: var(--text-secondary); font-size: 0.85rem; text-align: center;" data-i18n="footer.quote">"知之真切笃实处即是行，行之明觉精察处即是知。"</p>
        <p style="color: var(--text-secondary); font-size: 0.8rem; text-align: center;" data-i18n="footer.quote.source">— 王阳明 · 《传习录》</p>
        <p class="copyright" data-i18n="footer.copyright">© 2026 知行工作室 - 理会 · 践行</p>
    </footer>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme && savedTheme !== 'system') {
                document.body.classList.add(savedTheme + '-mode');
            } else if (savedTheme === 'system' || !savedTheme) {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefersDark) {
                    document.body.classList.add('dark-mode');
                }
            }
            // i18n
            var cl = localStorage.getItem('w3b_lang') ||
                (navigator.language.startsWith('zh-TW') || navigator.language.startsWith('zh-HK') ? 'zh-TW' :
                 navigator.language.startsWith('zh') ? 'zh' : 'en');
            var I18N = window.I18N || null;
            var i18nReady = !!(I18N && I18N.zh);
            function t(k) {
                if (!i18nReady) return null;
                try {
                    var d = I18N[cl] || I18N['zh'];
                    if (d && d[k]) return d[k];
                    if (I18N['zh'] && I18N['zh'][k]) return I18N['zh'][k];
                    return null;
                } catch(e) { return null; }
            }
            if (i18nReady) {
                document.documentElement.lang = cl === 'zh-TW' ? 'zh-TW' : cl === 'en' ? 'en' : 'zh-CN';
                document.querySelectorAll('[data-i18n]').forEach(function(el) { var v = t(el.getAttribute('data-i18n')); if (v) el.textContent = v; });
                document.querySelectorAll('[data-i18n-content]').forEach(function(el) { var v = t(el.getAttribute('data-i18n-content')); if (v) el.setAttribute('content', v); });
                var title = t('404.meta.title');
                if (title) document.title = title;
            }
        })();
    </script>
</body>
</html>
