                --text-color: #f3f4f6;
                --text-secondary: #d1d5db;
                --text-light: #9ca3af;
                --dark-color: #f9fafb;
                --accent-color: #8b5cf6;
                --accent-secondary: #6366f1;
                --border-color: #374151;
                --card-bg: #1f2937;
                --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
                --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.25);
            }
        }

        body.dark-mode {
            --bg-color: #111827;
            --text-color: #f3f4f6;

            --card-shadow: 0 2px 8px rgba(139, 92, 246, 0.06);

        body.orange-mode {

        body.teal-mode {

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-normal), color var(--transition-normal);
            font-family: 'Noto Sans SC', sans-serif;
            line-height: 1.6;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .site-title {
            font-size: clamp(2rem, 5vw, 3.5rem);

        .error-section {
            text-align: center;
            padding: 4rem 1rem;

        .error-code {
            font-size: 6rem;
            font-weight: 300;
            color: var(--accent-color);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .error-message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .back-home {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-home:hover {
            background: var(--accent-secondary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            border-top: 1px solid var(--border-color);
            margin-top: 3rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        footer p { margin-bottom: 0.5rem; }

        .copyright { color: var(--text-light); font-size: 0.85rem; }

<body>
    <!-- AI神经网络背景装饰 -->
    <svg class="neural-bg" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.03; pointer-events: none;">
        <defs>
            <pattern id="neural-grid" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
                <circle cx="100" cy="100" r="2" fill="currentColor"/>
                <circle cx="0" cy="0" r="1.5" fill="currentColor"/>
                <circle cx="200" cy="0" r="1.5" fill="currentColor"/>
                <circle cx="0" cy="200" r="1.5" fill="currentColor"/>
                <circle cx="200" cy="200" r="1.5" fill="currentColor"/>
                <circle cx="50" cy="50" r="1" fill="currentColor"/>
                <circle cx="150" cy="50" r="1" fill="currentColor"/>
                <circle cx="50" cy="150" r="1" fill="currentColor"/>
                <circle cx="150" cy="150" r="1" fill="currentColor"/>
                <line x1="100" y1="100" x2="50" y2="50" stroke="currentColor" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="150" y2="50" stroke="currentColor" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="50" y2="150" stroke="currentColor" stroke-width="0.5"/>
                <line x1="100" y1="100" x2="150" y2="150" stroke="currentColor" stroke-width="0.5"/>
                <line x1="50" y1="50" x2="150" y2="50" stroke="currentColor" stroke-width="0.3"/>
                <line x1="50" y1="150" x2="150" y2="150" stroke="currentColor" stroke-width="0.3"/>
                <line x1="50" y1="50" x2="50" y2="150" stroke="currentColor" stroke-width="0.3"/>
                <line x1="150" y1="50" x2="150" y2="150" stroke="currentColor" stroke-width="0.3"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#neural-grid)"/>
    </svg>

    <header>
        <h1 class="site-title">知行工作室</h1>
    </header>

    <section class="error-section">
        <div class="error-code">404</div>
        <p class="error-message">
            页面未找到<br>
            您访问的页面可能已被移除或暂时不可用
        </p>
        <a href="/" class="back-home">返回首页</a>
    </section>

    <footer>
        <p style="color: var(--text-secondary); font-size: 0.85rem; text-align: center;">"理无专在，而学无止境也。然则问可少耶？"</p>
        <p style="color: var(--text-secondary); font-size: 0.8rem; text-align: center;">— 清代刘开《问说》</p>
        <p class="copyright">© 2026 知行工作室 - 理会 · 践行</p>
    </footer>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme && savedTheme !== 'system') {
                document.body.classList.add(savedTheme + '-mode');
            } else if (savedTheme === 'system' || !savedTheme) {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (prefersDark) {
                    document.body.classList.add('dark-mode');
                }
            }
        })();
    </script>
</body>
</html>
